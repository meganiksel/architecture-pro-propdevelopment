# Constraint: K8sDenyHostPath — применяется ко всем namespace кроме системных
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sDenyHostPath
metadata:
  name: deny-hostpath-volumes
  annotations:
    description: "Запрещает hostPath volumes во всех namespace кроме системных."
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
      - cert-manager
  parameters:
    message: "Использование hostPath volumes запрещено политикой безопасности PropDevelopment."

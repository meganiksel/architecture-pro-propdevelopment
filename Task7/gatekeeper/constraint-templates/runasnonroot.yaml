# ConstraintTemplate: runAsNonRoot, readOnlyRootFilesystem, allowPrivilegeEscalation: false — обязательны
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirenonroot
  annotations:
    description: "Требует runAsNonRoot: true, readOnlyRootFilesystem: true и allowPrivilegeEscalation: false для всех контейнеров."
spec:
  crd:
    spec:
      names:
        kind: K8sRequireNonRoot
      validation:
        openAPIV3Schema:
          type: object
          properties:
            message:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirenonroot

        import future.keywords.contains
        import future.keywords.if

        # Наследование runAsNonRoot от pod-level securityContext
        effective_run_as_non_root(container, pod_spec) := result if {
          result := container.securityContext.runAsNonRoot
        } else := result if {
          result := pod_spec.securityContext.runAsNonRoot
        } else := false

        violation contains msg if {
          container := input.review.object.spec.containers[_]
          not effective_run_as_non_root(container, input.review.object.spec)
          msg := sprintf(
            "Контейнер '%v' в поде '%v': требуется runAsNonRoot: true. Запуск от root запрещён.",
            [container.name, input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          container := input.review.object.spec.containers[_]
          container.securityContext.runAsUser == 0
          msg := sprintf(
            "Контейнер '%v' в поде '%v': runAsUser: 0 (root) запрещён. Используйте UID >= 1000.",
            [container.name, input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          input.review.object.spec.securityContext.runAsUser == 0
          msg := sprintf(
            "Под '%v': runAsUser: 0 (root) на уровне пода запрещён.",
            [input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          container := input.review.object.spec.containers[_]
          not container.securityContext.readOnlyRootFilesystem
          msg := sprintf(
            "Контейнер '%v' в поде '%v': требуется readOnlyRootFilesystem: true.",
            [container.name, input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          container := input.review.object.spec.containers[_]
          container.securityContext.allowPrivilegeEscalation != false
          msg := sprintf(
            "Контейнер '%v' в поде '%v': требуется allowPrivilegeEscalation: false.",
            [container.name, input.review.object.metadata.name]
          )
        }

# ConstraintTemplate: запрет privileged: true в containers и initContainers
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenyprivileged
  annotations:
    description: "Запрещает создание подов с privileged: true в securityContext контейнера."
spec:
  crd:
    spec:
      names:
        kind: K8sDenyPrivileged
      validation:
        openAPIV3Schema:
          type: object
          properties:
            message:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenyprivileged

        import future.keywords.contains
        import future.keywords.if

        violation contains msg if {
          container := input.review.object.spec.containers[_]
          container.securityContext.privileged == true
          msg := sprintf(
            "Контейнер '%v' в поде '%v' использует privileged: true. Это запрещено политикой безопасности PropDevelopment.",
            [container.name, input.review.object.metadata.name]
          )
        }

        violation contains msg if {
          container := input.review.object.spec.initContainers[_]
          container.securityContext.privileged == true
          msg := sprintf(
            "InitContainer '%v' в поде '%v' использует privileged: true. Это запрещено политикой безопасности PropDevelopment.",
            [container.name, input.review.object.metadata.name]
          )
        }

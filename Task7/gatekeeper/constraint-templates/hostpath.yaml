# ConstraintTemplate: запрет hostPath volumes
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdenyhostpath
  annotations:
    description: "Запрещает использование hostPath volumes в подах."
spec:
  crd:
    spec:
      names:
        kind: K8sDenyHostPath
      validation:
        openAPIV3Schema:
          type: object
          properties:
            message:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenyhostpath

        import future.keywords.contains
        import future.keywords.if

        violation contains msg if {
          volume := input.review.object.spec.volumes[_]
          volume.hostPath
          msg := sprintf(
            "Под '%v' использует hostPath volume '%v'. Монтирование директорий хоста запрещено политикой безопасности PropDevelopment.",
            [input.review.object.metadata.name, volume.name]
          )
        }
